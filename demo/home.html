<body>
    <!-- nabbar -->
    <div class="top-nab">
        <div class="container">
            <div class="row">
                <!-- bắt đầu nội dung của nabbar -->

                <!-- logo, home, ... -->
                <div class="col-md-9" style="display: flex;">
                    <a href="./index.html">
                        <!-- <img src="../resource/image/test.png" alt="" class="logo"> -->
                        <img src="../resource/image/logo.png" alt="" class="logo">
                    </a>
                    <div style="font-size: 16px;
                                vertical-align: top;
                                color: #fff;
                                position: relative;
                                padding: 21px 20px;">
                        | Online class
                    </div>

                    <a href="./index.html">
                        <div class="nab-item">
                            Trang chủ
                        </div>
                    </a>

                    <a href="#">
                        <div class="nab-item">
                            Lớp học
                        </div>
                    </a>
                </div>

                <!-- thanh tìm kiếm, đăng kí đăng nhập, ... -->
                <div class="col-md-3" style="display: flex;">
                    <div class="search-bar">
                        <input type="text" class="search-bar-input">
                        <button class="search-bar-button">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <div class="nab-item" style="border-radius: 50%; 
                                                width: 66px;">
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <!-- kết thúc nội dung nabbar -->
            </div>
        </div>
    </div>
    <!-- end nabbar -->

    <!-- slide show -->
    <div class="slide-show">
        <div class="container">
            <div class="row">
                <!-- bắt đầu nội dung của slide show -->

                <!-- slide trong này -->
                <div class="col-md-9">
                    <div class="slide">
                        <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
                            <div class="carousel-indicators">
                                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
                                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3" aria-label="Slide 4"></button>
                                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="4" aria-label="Slide 5"></button>
                            </div>
                            <div class="carousel-inner">
                                <div class="carousel-item active">
                                    <img src="../resource/image/slide1.png" class="d-block w-100" alt="...">
                                </div>
                                <div class="carousel-item">
                                    <img src="../resource/image/slide2.png" class="d-block w-100" alt="...">
                                </div>
                                <div class="carousel-item">
                                    <img src="../resource/image/slide3.jpg" class="d-block w-100" alt="...">
                                </div>
                                <div class="carousel-item">
                                    <img src="../resource/image/slide1.png" class="d-block w-100" alt="...">
                                </div>
                                <div class="carousel-item">
                                    <img src="../resource/image/slide2.png" class="d-block w-100" alt="...">
                                </div>
                            </div>
                            <button class="carousel-control-prev slide-button" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                              <span class="visually-hidden">Previous</span>
                            </button>
                            <button class="carousel-control-next slide-button" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                              <span class="carousel-control-next-icon" aria-hidden="true"></span>
                              <span class="visually-hidden">Next</span>
                            </button>
                        </div>
                    </div>
                    <!-- về căn bản thì slide show thế này cũng dc nhưng tôi muốn chỉnh sửa nhiều hơn -->

                    <!-- chưa biết thêm j vào đây -->
                    <div class="col-md-3">
                        <div class="???">

                        </div>
                    </div>

                    <!-- kết thúc nội dung của slide show -->
                </div>
            </div>
        </div>

                        <div class="tintuc">

                                <div class="col-md-12">

                                        <div class="card-body">
                                            <h4 class="card-title">Tin tức đầu tiên</h4>
                                            <p class="card-text">tóm tắt của tin tức đầu tiên
                                            </p>
                                        </div>
                                        <div class="image-site">
                                            <img class="card-img-top" src="../resource/image/slide1.png" alt="" style="max-width: 300px;">
                                            <img class="card-img-top" src="../resource/image/slide1.png" alt="" style="max-width: 300px;">
                                            <img class="card-img-top" src="../resource/image/slide1.png" alt="" style="max-width: 300px;">
                                        </div>
                                        <div class="row">
                                            <div class="col-md-10" style="display: flex;">
                                                <div style="display: flex; padding-left: 10px;">
                                                    <i class="fas fa-eye"></i>
                                                    <p>0</p>
                                                </div>
                                                <div style="display: flex; padding-left: 10px;">
                                                    <i class="fas fa-comment-dots"></i>
                                                    <p>0</p>
                                                </div>
                                            </div>
                                            <div class="col-md-2">
                                                <button style="float: right;">
                                                    Chi tiét <i class="fas fa-chevron-circle-right"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- các tin tức khác -->
                                <script src="../js/tintuc.js"></script>

                                            <div class="col-sm-3">
                                                25/4
                                            </div>
                                            <div class="col-sm-9">
                                                <h5>lần đầu có sự kiện</h5>
                                            </div>
                                        </div>
                                    </li>

                                    <!-- các tiêu điểm khác -->
                                    <script src="../js/tieudiem.js"></script>
                                </ul>

                            </div>
                            <button>
                                <i class="fas fa-chevron-circle-down"></i>
                                Xem thêm
                            </button>

                        </div>
                    </div>

                    <!-- kết thúc nội dung chính -->
                </div>
            </div>

        <!-- thông tin khác -->
        <div class="thongtinkhac">
            <div class="container">
                <div class="row">
